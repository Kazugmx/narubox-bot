name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  check:
    name: Run tests and compile
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret
      APIKEY: test-api-key
      CALLBACK_ORIGIN: localhost
      URI_MASTER: https://example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run tests and build
        run: ./gradlew test build --no-daemon

  release-build:
    name: Build release artifact for tags
    if: startsWith(github.ref, 'refs/tags/')
    needs: check
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret
      APIKEY: test-api-key
      CALLBACK_ORIGIN: localhost
      URI_MASTER: https://example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build fat JAR
        run: ./gradlew buildFatJar --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: narubox-bot-${{ github.ref_name }}
          path: build/libs/*.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release build for ${{ github.ref_name }}.
          files: |
            build/libs/*.jar
